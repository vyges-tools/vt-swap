# CI — runs on push to main and on pull requests (plus manual dispatch).
name: ci
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: build + test + clippy
        run: |
          cargo build --locked
          cargo test --locked
          cargo clippy --all-targets -- -D warnings
