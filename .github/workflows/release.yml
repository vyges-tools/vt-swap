# Matrix multi-platform release build — publishes the prebuilt binaries that
# `vyges install <engine>` fetches (`vyges-<repo>-<target>.tar.gz`).
# Triggers: a pushed tag `v*` (the tag IS the release), or a manual run with an
# explicit tag input.
name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create (e.g. v0.0.1)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: build · ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-14,        target: aarch64-apple-darwin }
          - { os: ubuntu-latest,   target: x86_64-unknown-linux-gnu }
          - { os: ubuntu-24.04-arm, target: aarch64-unknown-linux-gnu }
    steps:
      - uses: actions/checkout@v4
      - name: Tag matches crate version
        run: |
          want="${{ inputs.tag || github.ref_name }}"; want="${want#v}"
          have="$(grep -m1 '^version' Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')"
          [ "$want" = "$have" ] || { echo "::error::tag v$want != Cargo.toml version $have — bump [package] version"; exit 1; }
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
      - name: Package
        shell: bash
        run: |
          bin="vyges-${GITHUB_REPOSITORY##*/}"
          stage="${bin}-${{ matrix.target }}"
          mkdir -p "$stage"
          cp "target/${{ matrix.target }}/release/${bin}" "$stage/"
          cp README.md LICENSE NOTICE "$stage/"
          tar -czf "${stage}.tar.gz" "$stage"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: "*.tar.gz"

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Checksums
        run: cd dist && sha256sum *.tar.gz > SHA256SUMS
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          name: ${{ inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/SHA256SUMS
